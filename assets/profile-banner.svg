    <text x="754" y="191" text-anchor="middle" fill="#6E6E6E" font-size="12" font-family="Arial, Helvetica, sans-serif">Pricing</text>

    <rect x="852" y="146" width="168" height="44" rx="16" fill="#FFF8F2" stroke="#E5D6C8"/>
    <text x="936" y="173" text-anchor="middle" fill="#2B2B2B" font-size="18" font-family="Arial, Helvetica, sans-serif">Model B</text>
    <text x="936" y="191" text-anchor="middle" fill="#6E6E6E" font-size="12" font-family="Arial, Helvetica, sans-serif">Moderation</text>

    <rect x="761" y="208" width="168" height="44" rx="16" fill="#FFF8F2" stroke="#E5D6C8"/>
    <text x="845" y="235" text-anchor="middle" fill="#2B2B2B" font-size="18" font-family="Arial, Helvetica, sans-serif">Model C</text>
    <text x="845" y="253" text-anchor="middle" fill="#6E6E6E" font-size="12" font-family="Arial, Helvetica, sans-serif">Recommendations</text>
