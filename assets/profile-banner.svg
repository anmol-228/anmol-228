<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5E9DC"/>
      <stop offset="1" stop-color="#FFF8F2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7B1E2B"/>
      <stop offset="1" stop-color="#5A1420"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#7B1E2B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <g opacity="0.18">
    <circle cx="1035" cy="70" r="120" fill="#7B1E2B"/>
    <circle cx="1125" cy="270" r="110" fill="#E5D6C8"/>
    <circle cx="90" cy="260" r="100" fill="#EBD5C4"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="58" y="58" width="465" height="204" rx="24" fill="#FFF8F2"/>
    <rect x="78" y="82" width="120" height="8" rx="4" fill="#7B1E2B" opacity="0.35"/>
    <text x="78" y="134" fill="#7B1E2B" font-size="42" font-family="Georgia, 'Times New Roman', serif" font-style="italic">anmol-228</text>
    <text x="78" y="172" fill="#2B2B2B" font-size="20" font-family="Arial, Helvetica, sans-serif">Full-stack developer building RentAFit</text>
    <text x="78" y="204" fill="#6E6E6E" font-size="18" font-family="Arial, Helvetica, sans-serif">ML systems • Spring Boot • React • recommendation + moderation</text>
    <rect x="78" y="224" width="164" height="24" rx="12" fill="#7B1E2B"/>
    <text x="160" y="241" text-anchor="middle" fill="#FFF8F2" font-size="13" font-family="Arial, Helvetica, sans-serif">Focused on production-ready builds</text>
  </g>

  <g opacity="0.95">
    <rect x="670" y="72" width="420" height="56" rx="18" fill="#7B1E2B"/>
    <text x="700" y="107" fill="#FFF8F2" font-size="20" font-family="Arial, Helvetica, sans-serif">Current flagship: RentAFit ML + platform integration</text>

    <rect x="670" y="146" width="168" height="44" rx="16" fill="#FFF8F2" stroke="#E5D6C8"/>
